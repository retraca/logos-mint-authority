name: CI

on:
  push:
    branches: [master, main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install LEZ ZK circuits (required to build nssa_core)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download v0.4.2 \
            --repo logos-blockchain/logos-blockchain-circuits \
            --pattern '*linux-x86_64.tar.gz' \
            --output circuits.tar.gz
          mkdir -p extracted
          tar -xzf circuits.tar.gz -C extracted
          mv extracted/* "$HOME/.logos-blockchain-circuits"
          test "$(cat "$HOME/.logos-blockchain-circuits/VERSION")" = "v0.4.2"

      - name: Format
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test (host)
        run: cargo test --workspace

# The guest compiles for the on-chain riscv32im-risc0-zkvm-elf target; the built
# ELF and the deployable R0BF .bin are checked into the repo, and the on-chain
# run (RISC0_DEV_MODE=0) is reproduced via demo/run_demo.sh. The risc0 toolchain
# build is not run in CI (heavy, and not required to verify the library).
